<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&R Admin</title>
<style>
  :root { --maroon: #6B0F1A; --gold: #C9A84C; --dark: #0F0408; --ivory: #F5EFE6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--ivory); font-family: -apple-system, sans-serif; min-height: 100vh; }

  #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at center, #1A0610 0%, #0F0408 100%); }
  .login-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.3); border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 400px; text-align: center; }
  .login-box h1 { font-size: 2.5rem; color: var(--gold); margin-bottom: 0.25rem; }
  .login-box p { color: rgba(245,239,230,0.5); font-size: 0.85rem; margin-bottom: 2rem; }
  .login-box input { width: 100%; padding: 0.9rem 1.2rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.25); border-radius: 10px; color: var(--ivory); font-size: 1rem; margin-bottom: 1rem; outline: none; }
  .login-box input:focus { border-color: var(--gold); }
  .login-btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, var(--maroon), #9B1A2A); border: none; border-radius: 10px; color: var(--gold); font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
  .login-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  #dashboard { display: none; }
  .top-bar { background: linear-gradient(135deg, var(--maroon), #3A0810); border-bottom: 1px solid rgba(201,168,76,0.2); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 1.4rem; color: var(--gold); }
  .top-bar span { font-size: 0.8rem; color: rgba(245,239,230,0.5); }
  .logout-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(201,168,76,0.2); color: var(--ivory); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; }
  .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.15); border-radius: 14px; padding: 1.25rem; text-align: center; }
  .stat-card .num { font-size: 2rem; font-weight: 800; color: var(--gold); }
  .stat-card .label { font-size: 0.75rem; color: rgba(245,239,230,0.5); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 1px; }

  .filter-bar { padding: 0 2rem 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(201,168,76,0.25); background: transparent; color: var(--ivory); cursor: pointer; }
  .filter-btn.active { background: var(--gold); color: var(--dark); font-weight: 700; border-color: var(--gold); }
  .refresh-btn { margin-left: auto; padding: 0.4rem 1rem; border-radius: 20px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-size: 0.8rem; cursor: pointer; }

  .orders-wrap { padding: 0 2rem 2rem; }
  .order-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.12); border-radius: 14px; margin-bottom: 1rem; overflow: hidden; }
  .order-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; cursor: pointer; }
  .order-header:hover { background: rgba(255,255,255,0.02); }
  .order-id { font-size: 0.9rem; font-weight: 700; color: var(--gold); }
  .order-name { font-size: 0.85rem; color: var(--ivory); margin-top: 2px; }
  .order-date { font-size: 0.75rem; color: rgba(245,239,230,0.4); }
  .order-total { font-size: 1.1rem; font-weight: 800; color: var(--gold); text-align: right; }
  .order-total small { display: block; font-size: 0.7rem; font-weight: 400; color: rgba(245,239,230,0.4); }

  .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-pending   { background: rgba(255,193,7,0.15);  color: #FFC107; }
  .status-confirmed { background: rgba(33,150,243,0.15); color: #2196F3; }
  .status-shipped   { background: rgba(156,39,176,0.15); color: #9C27B0; }
  .status-delivered { background: rgba(76,175,80,0.15);  color: #4CAF50; }
  .status-cancelled { background: rgba(244,67,54,0.15);  color: #F44336; }

  .order-details { padding: 1.25rem; display: none; border-top: 1px solid rgba(201,168,76,0.08); }
  .order-details.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .detail-item label { font-size: 0.7rem; color: rgba(245,239,230,0.4); text-transform: uppercase; letter-spacing: 1px; display: block; }
  .detail-item span { font-size: 0.88rem; color: var(--ivory); }
  .items-list { background: rgba(201,168,76,0.05); border-radius: 8px; padding: 0.75rem; margin-bottom: 1rem; font-size: 0.85rem; line-height: 1.7; }
  .status-update { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .status-update label { font-size: 0.78rem; color: rgba(245,239,230,0.5); }
  .status-select { padding: 0.4rem 0.75rem; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.25); color: var(--ivory); font-size: 0.85rem; cursor: pointer; }
  .update-btn { padding: 0.4rem 1rem; border-radius: 8px; background: var(--gold); border: none; color: var(--dark); font-size: 0.82rem; font-weight: 700; cursor: pointer; }
  .wa-btn { padding: 0.4rem 1rem; border-radius: 8px; background: #25D366; border: none; color: #fff; font-size: 0.82rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
  .empty { text-align: center; padding: 4rem; color: rgba(245,239,230,0.3); }
  .loading { text-align: center; padding: 3rem; color: var(--gold); }

  @media(max-width:600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; padding: 1rem; }
    .orders-wrap, .filter-bar { padding-left: 1rem; padding-right: 1rem; }
    .detail-grid { grid-template-columns: 1fr; }
    .top-bar { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h1>M&R</h1>
    <p>Admin Dashboard — Staff Only</p>
    <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">LOGIN →</button>
    <div class="login-error" id="loginError">Wrong password. Try again.</div>
  </div>
</div>

<div id="dashboard">
  <div class="top-bar">
    <div>
      <h1>M&R Admin</h1>
      <span id="lastUpdated">Loading...</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total Orders</div></div>
    <div class="stat-card"><div class="num" id="statRevenue">₹0</div><div class="label">Revenue</div></div>
    <div class="stat-card"><div class="num" id="statPending">0</div><div class="label">Pending</div></div>
    <div class="stat-card"><div class="num" id="statDelivered">0</div><div class="label">Delivered</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterOrders('all',this)">All</button>
    <button class="filter-btn" onclick="filterOrders('pending',this)">Pending</button>
    <button class="filter-btn" onclick="filterOrders('confirmed',this)">Confirmed</button>
    <button class="filter-btn" onclick="filterOrders('shipped',this)">Shipped</button>
    <button class="filter-btn" onclick="filterOrders('delivered',this)">Delivered</button>
    <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
  </div>

  <div class="orders-wrap" id="ordersWrap">
    <div class="loading">Loading orders...</div>
  </div>
</div>

<script>
const BACKEND = 'https://mr-backend-lr9l.onrender.com';
const ADMIN_PASSWORD = 'MR@admin2024';
let allOrders = [];

function login() {
  const pwd = document.getElementById('passwordInput').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('mrAdmin','yes');
    loadOrders();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  sessionStorage.removeItem('mrAdmin');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

if (sessionStorage.getItem('mrAdmin') === 'yes') {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadOrders();
}

async function loadOrders() {
  try {
    document.getElementById('ordersWrap').innerHTML = '<div class="loading">Loading orders...</div>';
    const res = await fetch(BACKEND + '/api/orders');
    allOrders = await res.json();
    updateStats();
    renderOrders(allOrders);
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('ordersWrap').innerHTML = '<div class="empty">⚠️ Could not connect to backend.</div>';
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allOrders.length;
  const revenue = allOrders.filter(o => o.status !== 'cancelled').reduce((s,o) => s+(o.total||0), 0);
  document.getElementById('statRevenue').textContent = '₹' + revenue.toLocaleString();
  document.getElementById('statPending').textContent = allOrders.filter(o => o.status==='pending').length;
  document.getElementById('statDelivered').textContent = allOrders.filter(o => o.status==='delivered').length;
}

function filterOrders(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
  renderOrders(filtered);
}

function renderOrders(orders) {
  if (!orders.length) { document.getElementById('ordersWrap').innerHTML = '<div class="empty">No orders found.</div>'; return; }
  document.getElementById('ordersWrap').innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-header" onclick="toggleOrder('${o.orderId}')">
        <div>
          <div class="order-id">#${o.orderId}</div>
          <div class="order-name">${o.name||'N/A'} · ${o.phone||''}</div>
          <div class="order-date">${new Date(o.createdAt).toLocaleString('en-IN')}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;">
          <span class="status-badge status-${o.status||'pending'}">${o.status||'pending'}</span>
          <div class="order-total">₹${(o.total||0).toLocaleString()}<small>${o.paymentMethod||''}</small></div>
        </div>
      </div>
      <div class="order-details" id="det-${o.orderId}">
        <div class="detail-grid">
          <div class="detail-item"><label>Email</label><span>${o.email||'—'}</span></div>
          <div class="detail-item"><label>Pincode</label><span>${o.pincode||'—'}</span></div>
          <div class="detail-item"><label>City</label><span>${o.city||'—'}</span></div>
          <div class="detail-item"><label>State</label><span>${o.state||'—'}</span></div>
          <div class="detail-item" style="grid-column:1/-1"><label>Address</label><span>${o.address||'—'}</span></div>
          <div class="detail-item"><label>Coupon Used</label><span>${o.couponCode||'None'}</span></div>
          <div class="detail-item"><label>Discount</label><span>₹${o.discount||0}</span></div>
        </div>
        <div class="items-list"><strong>Items Ordered:</strong><br>${(o.items||'').replace(/\n/g,'<br>')}</div>
        <div class="status-update">
          <label>Update Status:</label>
          <select class="status-select" id="sel-${o.orderId}">
            <option value="pending"   ${o.status==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="shipped"   ${o.status==='shipped'?'selected':''}>Shipped</option>
            <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
          <button class="update-btn" onclick="updateStatus('${o.orderId}')">Save</button>
          <a class="wa-btn" href="https://wa.me/91${o.phone}?text=Hi+${encodeURIComponent(o.name||'')}%2C+your+M%26R+order+%23${o.orderId}+update!" target="_blank">💬 WhatsApp</a>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleOrder(id) { document.getElementById('det-'+id).classList.toggle('open'); }

async function updateStatus(orderId) {
  const status = document.getElementById('sel-'+orderId).value;
  try {
    await fetch(BACKEND+'/api/orders/'+orderId, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
    await loadOrders();
  } catch(e) { alert('Failed to update. Try again.'); }
}
</script>
</body>
</html>
